<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Content page: full green background from actual PPTX -->
  <image x="0" y="0" width="1280" height="720" xlink:href="./content_bg.png" preserveAspectRatio="xMidYMid slice"/>

  <!-- Header band decoration (matches PPTX: y=91, original height=302, white box covers from y=176) -->
  <image x="0" y="91" width="1280" height="302" xlink:href="./header_band.png" preserveAspectRatio="xMidYMid slice"/>

  <!-- Brand emblem top-right (1099, 23), size 134x51 — matches slide position -->
  <image x="1099" y="23" width="134" height="51" xlink:href="./brand_emblem.png" preserveAspectRatio="xMidYMid meet"/>

  <!-- Page title: white bold text in top green header area (y≈61 baseline) -->
  <text x="32" y="61" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28"
    font-weight="bold" fill="#222222" letter-spacing="1">{{PAGE_TITLE}}</text>

  <!-- Section name: white text in lower header area (y≈130 baseline) -->
  <text x="32" y="130" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" letter-spacing="1">{{SECTION_NAME}}</text>

  <!-- Content area: white rounded rectangle (53,176) to (1230,684) — matches PPTX white box -->
  <rect x="53" y="176" width="1177" height="508" fill="#FFFFFF" rx="8" ry="8"/>

  <!-- Content area placeholder text (black on white) -->
  <text x="641" y="440" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" fill="#BBBBBB" text-anchor="middle">{{CONTENT_AREA}}</text>

  <!-- Page number: bottom-right -->
  <text x="1220" y="704" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#898989" text-anchor="end">{{PAGE_NUM}}</text>
</svg>
