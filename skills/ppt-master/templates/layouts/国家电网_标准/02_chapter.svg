<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Chapter background: full-bleed dark image (same as cover) -->
  <image x="0" y="0" width="1280" height="720" xlink:href="./cover_bg.jpg" preserveAspectRatio="xMidYMid slice"/>

  <!-- Brand logo top-left -->
  <image x="79" y="57" width="170" height="57" xlink:href="./brand_logo.png" preserveAspectRatio="xMinYMid meet"/>


  <!-- Chapter number label -->
  <text x="76" y="310" font-family="Calibri, Arial, sans-serif" font-size="56" font-weight="bold"
    fill="#FFFFFF" letter-spacing="2">{{CHAPTER_NUM}}</text>

  <!-- Chapter title -->
  <text x="76" y="390" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" letter-spacing="2">{{CHAPTER_TITLE}}</text>

 
</svg>
