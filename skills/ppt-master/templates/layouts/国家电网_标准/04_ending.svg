<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Ending background: same green cover image -->
  <image x="0" y="0" width="1280" height="720" xlink:href="./cover_bg.jpg" preserveAspectRatio="xMidYMid slice"/>

  <!-- Brand logo top-left — matches cover page -->
  <image x="79" y="58" width="170" height="56" xlink:href="./brand_logo.png" preserveAspectRatio="xMinYMid meet"/>

  <!-- Thank-you main message: large white bold (matches PPTX "汇报完毕！" style) -->
  <text x="76" y="380" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" letter-spacing="4">{{THANK_YOU}}</text>

  <!-- Contact info / closing message -->
  <text x="76" y="450" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" fill="#FFFFFF" fill-opacity="0.85" letter-spacing="1">{{CONTACT_INFO}}</text>


</svg>
