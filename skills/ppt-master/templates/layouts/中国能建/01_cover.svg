<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- White base -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Full-bleed background photo  -->
  <image href="cover_bg.png" x="0" y="0" width="1280" height="720"
            preserveAspectRatio="xMidYMid slice" />


      <!-- Brand logo — centered near top, over photo -->
  <image href="brand_logo.png" x="453" y="28" width="374" height="98"
         preserveAspectRatio="xMidYMid meet"/>

      <!-- Main title -->
  <text x="640" y="335"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="52"
        font-weight="bold">{{TITLE}}</text>

      <!-- Subtitle -->
  <text x="640" y="400"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="26">{{SUBTITLE}}</text>

      <!-- Thin horizontal divider in white area -->
  <line x1="440" y1="606" x2="840" y2="606" stroke="#FFFFFF" stroke-width="1" />

      <!-- Date -->
  <text x="640" y="636"
            text-anchor="middle"
            fill="#FFFFFF"
            font-family="Microsoft YaHei, sans-serif"
            font-size="18">{{DATE}}</text>

      <!-- Author / Organization -->
  <text x="640" y="666"
            text-anchor="middle"
            fill="#FFFFFF"
            font-family="Microsoft YaHei, sans-serif"
            font-size="16">{{AUTHOR}}</text>
</svg>
