<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- ── LEFT COLUMN BRANDING (x 0–465) ── -->

  <!-- Top-left blue accent block -->
  <rect x="0" y="20" width="18" height="62" fill="#0068b7"/>

  <!-- Dark navy horizontal rule at y=82 -->
  <line x1="54" y1="82" x2="1234" y2="82" stroke="#002f7b" stroke-width="1.33"/>

  <!-- Simplified CNCE "C" mark — blue rounded rectangle -->

      <image href="toc.png" x="81" y="287" width="324.8" height="156.8"
            preserveAspectRatio="xMidYMid slice" />

      <!-- Vertical divider between left column and TOC area -->
      <rect x="464" y="100" width="2" height="578" fill="##7F7F7F" opacity="0.5" />
      <rect x="468" y="100" width="1" height="578" fill="##7F7F7F" opacity="0.5" />

      <!-- ── RIGHT COLUMN TOC (x 465–1280) ── -->

      <!-- Brand logo — small, top-right -->
  <image href="brand_logo.png" x="985" y="16" width="252" height="50"
         preserveAspectRatio="xMidYMid meet"/>

      <!-- ── TOC ITEM 1 ── -->
      <!-- Gray decorative trim at top of number box -->
      <polygon points="550,218 620,218 628,226 542,226" fill="#c9c9c9" />
      <!-- TOC row background -->
      <rect x="534" y="230" width="694" height="50" fill="#f0f0f0"
            stroke="#dfdfe1" stroke-width="0.5" rx="4" ry="4" />
      <!-- Blue number box (protrudes 12 px above row) -->
  <rect x="549" y="218" width="71" height="54" fill="#0068b7"/>
      <!-- Chapter number -->
  <text x="585" y="253"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="22"
        font-weight="bold">01</text>
      <!-- Chapter title placeholder -->
  <text x="638" y="261"
        fill="#0068b7"
        font-family="Microsoft YaHei, sans-serif"
        font-size="18"
        font-weight="bold">{{TOC_ITEM_1_TITLE}}</text>

      <!-- ── TOC ITEM 2 ── -->
      <polygon points="550,330 620,330 628,338 542,338" fill="#c9c9c9" />
      <rect x="534" y="342" width="694" height="50" fill="#f0f0f0"
            stroke="#dfdfe1" stroke-width="0.5" rx="4" ry="4" />
  <rect x="549" y="330" width="71" height="54" fill="#0068b7"/>
  <text x="585" y="365"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="22"
        font-weight="bold">02</text>
  <text x="638" y="373"
        fill="#0068b7"
        font-family="Microsoft YaHei, sans-serif"
        font-size="18"
        font-weight="bold">{{TOC_ITEM_2_TITLE}}</text>

      <!-- ── TOC ITEM 3 ── -->
      <polygon points="550,442 620,442 628,450 542,450" fill="#c9c9c9" />
      <rect x="534" y="454" width="694" height="50" fill="#f0f0f0"
            stroke="#dfdfe1" stroke-width="0.5" rx="4" ry="4" />
  <rect x="549" y="442" width="71" height="54" fill="#0068b7"/>
  <text x="585" y="477"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="22"
        font-weight="bold">03</text>
  <text x="638" y="485"
        fill="#0068b7"
        font-family="Microsoft YaHei, sans-serif"
        font-size="18"
        font-weight="bold">{{TOC_ITEM_3_TITLE}}</text>

      <!-- ── TOC ITEM 4 ── -->
      <polygon points="550,554 620,554 628,562 542,562" fill="#c9c9c9" />
      <rect x="534" y="566" width="694" height="50" fill="#f0f0f0"
            stroke="#dfdfe1" stroke-width="0.5" rx="4" ry="4" />
  <rect x="549" y="554" width="71" height="54" fill="#0068b7"/>
  <text x="585" y="589"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="22"
        font-weight="bold">04</text>
  <text x="638" y="597"
        fill="#0068b7"
        font-family="Microsoft YaHei, sans-serif"
        font-size="18"
        font-weight="bold">{{TOC_ITEM_4_TITLE}}</text>

</svg>
