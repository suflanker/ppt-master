<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- ── TOP WHITE AREA (y 0–272) ── -->

  <!-- Brand logo — large, centered -->
  <image href="brand_logo.png" x="427" y="91" width="426" height="111"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Subtle separator line at top of blue band -->
  <line x1="232" y1="272" x2="694" y2="272" stroke="#f2f2f2" stroke-width="0.67"/>

  <!-- ── BLUE MIDDLE BAND (y 274–556) ── -->
  <rect x="0" y="274" width="1280" height="282" fill="#0068b7"/>

  <!-- Thank-you main message — large, centered in blue band -->
  <text x="640" y="396"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="54"
        font-weight="bold">敬请批评指正！</text>

</svg>
