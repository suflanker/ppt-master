<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">

  <!-- White background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <!-- Full-bleed background photo  -->
  <image href="content.png" x="0" y="0" width="1280" height="720"
            preserveAspectRatio="xMidYMid slice" opacity="0.6" />

      <!-- ── HEADER ZONE (y 0–97) ── -->

      <!-- Brand logo — small, top-right -->
  <image href="brand_logo.png" x="990" y="18" width="256" height="63"
         preserveAspectRatio="xMidYMid meet"/>

      <!-- Page title -->
  <text x="55" y="74"
        fill="#0068b7"
        font-family="Microsoft YaHei, sans-serif"
        font-size="32"
        font-weight="bold">{{PAGE_TITLE}}</text>

      <!-- Thick blue horizontal rule -->
  <rect x="0" y="91" width="1280" height="6" fill="#0068b7"/>

      <!-- ── CONTENT BOX (y 135–695) ── -->

      <!-- Light gray content area -->
  <rect x="10" y="105" width="1260" height="560" fill="#f2f2f2" />

    <!-- Dark blue key-message bar at top of content box -->
  <rect x="10" y="105" width="1260" height="68" fill="#005da2" />

    <!-- Key message text -->
  <text x="42" y="148"
        fill="#FFFFFF"
        font-family="Microsoft YaHei, sans-serif"
        font-size="21"
        font-weight="bold">{{KEY_MESSAGE}}</text>

    <!-- Content area placeholder -->
  <text x="630" y="420"
        text-anchor="middle"
        fill="#b0b8c4"
        font-family="Microsoft YaHei, sans-serif"
        font-size="16">{{CONTENT_AREA}}</text>

    <!-- ── FOOTER (y 700–720) ── -->

    <!-- Section name (bottom-left) -->
  <text x="55" y="712"
        fill="#4d4d4d"
        font-family="Microsoft YaHei, sans-serif"
        font-size="13">{{SECTION_NAME}}</text>

    <!-- Page number (bottom-right) -->
  <text x="1225" y="712"
        text-anchor="end"
        fill="#4d4d4d"
        font-family="Microsoft YaHei, sans-serif"
        font-size="13">{{PAGE_NUM}}</text>

</svg>
