<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- White base -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Full-slide background photo (right half visible after blue overlay) -->
  <image href="chapter_bg.jpeg" x="0" y="0" width="1280" height="720"
            preserveAspectRatio="xMidYMid slice" />

      <!-- Left half solid blue overlay -->
  <rect x="0" y="0" width="640" height="720" fill="#0067b4"/>

      <!-- Right-pointing chevron at the divider -->
  <polygon points="540,270 682,360 540,450" fill="#0067b4"/>

      <!-- Outer dashed white circle ring -->
  <circle cx="319" cy="337" r="115"
          fill="none"
          stroke="#FFFFFF"
          stroke-width="1.33"
          stroke-dasharray="1.77,1.77"/>

      <!-- Inner solid white circle -->
  <circle cx="319" cy="337" r="109" fill="#FFFFFF"/>

      <!-- Chapter number inside circle -->
  <text x="319" y="370"
        text-anchor="middle"
        fill="#0070c0"
        font-family="Microsoft YaHei, sans-serif"
        font-size="128"
        font-weight="bold">{{CHAPTER_NUM}}</text>

      <!-- Chapter title on right side -->
  <text x="700" y="370"
        fill="#0068b7"
        font-family="Microsoft YaHei, sans-serif"
        font-size="40"
        font-weight="bold">{{CHAPTER_TITLE}}</text>


</svg>
