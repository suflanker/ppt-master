<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#F1F9FC"/>
      <stop offset="1" stop-color="#F3F9FC"/>
    </linearGradient>
    <linearGradient id="bannerGrad" x1="0.4" y1="-0.07" x2="0.6" y2="1.07">
      <stop offset="0" stop-color="#F1F9FC"/>
      <stop offset="0" stop-color="#1D8578"/>
      <stop offset="1" stop-color="#18665C"/>
    </linearGradient>
    <filter id="cardShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#278375" flood-opacity="0.32"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGrad)"/>
  <!-- Header icon -->
  <image href="header_icon.png" x="1100" y="23" width="134" height="52" preserveAspectRatio="none"/>
  <!-- Top banner -->
  <rect x="0" y="91" width="1280" height="301" fill="url(#bannerGrad)"/>
  <!-- Banner overlay image (sprite crop) -->
  <svg x="0" y="92" width="1280" height="301" viewBox="0 0.46613 1 0.35362" preserveAspectRatio="none">
    <image href="content_banner.jpeg" x="0" y="0" width="1" height="1" opacity=".2" preserveAspectRatio="none" />
  </svg>
  <!-- Section indicator on banner -->
  <text x="37" y="124" text-anchor="start" xml:space="preserve" font-family="Microsoft YaHei, еЊЃиљѓйЫЕйїС, sans-serif" font-size="27" fill="#FFFFFF" font-weight="bold">{{SECTION_NAME}}</text>
  <!-- White content card -->
  <rect x="54" y="174" width="1180" height="509" rx="19" ry="19" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <!-- Page title -->
  <text x="31" y="55" text-anchor="start" xml:space="preserve" font-family="Microsoft YaHei, еЊЃиљѓйЫЕйїС, sans-serif" font-size="37" fill="#000000" font-weight="bold">{{PAGE_TITLE}}</text>
  <!-- Content area -->
  <text x="640" y="440" text-anchor="middle" xml:space="preserve" font-family="Microsoft YaHei, еЊЃиљѓйЫЕйїС, sans-serif" font-size="24" fill="#000000">{{CONTENT_AREA}}</text>
</svg>
